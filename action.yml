name: "Agentic Code Reviewer"
description: "An AI-powered PR reviewer using Groq and LangChain."
author: "Antigravity AI"

inputs:
  GITHUB_TOKEN:
    description: "GitHub Token for authenticated API calls."
    required: true
  GROQ_API_KEY:
    description: "Groq API Key for the LLM Brain."
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install langchain langchain-groq PyGithub python-dotenv pydantic semgrep

    - name: Run Review Agent
      shell: bash
      run: |
        python main.py
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        GROQ_API_KEY: ${{ inputs.GROQ_API_KEY }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
